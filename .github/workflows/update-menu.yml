name: update-menu

on:
  push:
    branches:
      - main
    paths:
      - 'source/**'
      - 'scripts/excel_to_json.py'
      - '.github/workflows/update-menu.yml'
  workflow_dispatch:

jobs:
  update-menu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository files
        run: |
          echo "Current directory:"
          pwd
          echo ""
          echo "Files under source/:"
          ls -lah source || true
          echo ""
          echo "All xlsx files found:"
          find . -type f \( -iname "*.xlsx" \)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Run Excel to JSON converter
        run: python scripts/excel_to_json.py

      - name: Commit updated JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/menu-data.json data/menu-data-full.json
          git diff --cached --quiet || git commit -m "Auto update menu JSON"
          git push
