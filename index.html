<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Hoyeh Menu</title>
  <style>
    html, body { margin:0; height:100%; background:#000; }
    .wrap { height:100%; display:flex; align-items:center; justify-content:center; position:relative; }
    img { max-width:100vw; max-height:100vh; object-fit:contain; display:block; }
    .badge { position:absolute; top:12px; right:12px; padding:6px 10px; border-radius:999px;
             background:rgba(0,0,0,.55); color:#fff; font:14px/1.2 system-ui, sans-serif; }
    .msg { color:#fff; font:20px/1.6 system-ui, sans-serif; padding:24px; text-align:center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge" id="badge"></div>
    <img id="slide" alt="Menu" style="display:none;" />
    <div class="msg" id="msg">Loading menu…</div>
  </div>

  <script>
    function yyyymmdd(d=new Date()){
      const y=d.getFullYear();
      const m=String(d.getMonth()+1).padStart(2,'0');
      const day=String(d.getDate()).padStart(2,'0');
      return `${y}${m}${day}`;
    }

    const folder = yyyymmdd();
    document.getElementById('badge').textContent = folder;

    const files = ["breakfast.png","lunch.png","dinner.png","supper.png"];
    const base = `images/${folder}/`;
    const urls = files.map(f => base + f);

    const img = document.getElementById('slide');
    const msg = document.getElementById('msg');

    function check(url){
      return new Promise(resolve=>{
        const t = new Image();
        t.onload=()=>resolve(url);
        t.onerror=()=>resolve(null);
        t.src=url;
      });
    }

    (async ()=>{
      const results = await Promise.all(urls.map(check));
      const ok = results.filter(Boolean);

      if(ok.length===0){
        msg.innerHTML = `No menu images found for <b>${folder}</b><br/>Please upload 4 images to <b>${base}</b>`;
        return;
      }

      msg.style.display="none";
      img.style.display="block";
      let i=0;
      img.src = ok[i];

      if(ok.length>1){
        setInterval(()=>{ i=(i+1)%ok.length; img.src=ok[i]; }, 5000);
      }
    })();
  </script>
</body>
</html>
