<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hoyeh Menu</title>

<style>
  :root{
    --arrow-bg: rgba(0,0,0,0.12);
    --arrow-active: rgba(0,0,0,0.32);
  }

  html, body {
    margin: 0;
    height: 100%;
    font-family: Arial, Helvetica, sans-serif;
    background: #fff;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  .topbar {
    padding: 8px 10px;
    border-bottom: 1px solid #ddd;
    background: #fff;
    flex: 0 0 auto;
  }

  .topbar-inner {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  select {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 10px;
    width: 170px;
    min-width: 170px;
    background: #fff;
    font-size: 14px;
  }

  .status {
    font-size: 14px;
    color: #666;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  .viewer {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: #fff;
    touch-action: pan-y;
  }

  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 60px;
    height: 80px;
    border: none;
    border-radius: 14px;
    font-size: 36px;
    background: var(--arrow-bg);
    color: #fff;
    cursor: pointer;
    opacity: 0;
    transition: opacity .25s ease, background .2s ease;
    z-index: 20;
  }

  .nav-arrow.active {
    opacity: 1;
    background: var(--arrow-active);
  }

  .nav-arrow.left { left: 10px; }
  .nav-arrow.right { right: 10px; }

  body.kiosk .topbar {
    display: none;
  }

  .canvas-wrap {
    position: relative;
    width: min(100vw, calc(100vh * 2160 / 3840));
    height: min(100vh, calc(100vw * 3840 / 2160));
    aspect-ratio: 2160 / 3840;
    overflow: hidden;
    background: #f7f2e9;
  }

  body:not(.kiosk) .canvas-wrap {
    width: min(100vw, calc((100vh - 60px) * 2160 / 3840));
    height: min(calc(100vh - 60px), calc(100vw * 3840 / 2160));
  }

  .menu-page {
    position: relative;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity .35s ease;
  }

  .menu-page.visible {
    opacity: 1;
  }

  .menu-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    pointer-events: none;
    user-select: none;
  }

  .content-layer {
    position: absolute;
    inset: 0;
    color: #333;
    text-align: center;
    box-sizing: border-box;
  }

  .presented-by {
    position: absolute;
    top: 3.2%;
    left: 0;
    width: 100%;
    font-size: 1.1%;
    color: #444;
    letter-spacing: 0.02em;
  }

  .menu-title {
    position: absolute;
    top: 10.2%;
    left: 0;
    width: 100%;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 2.7%;
    letter-spacing: 0.12em;
    color: #333;
  }

  .menu-date {
    position: absolute;
    top: 14.3%;
    left: 0;
    width: 100%;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 1.8%;
    letter-spacing: 0.08em;
    color: #333;
  }

  .breakfast-lines {
    position: absolute;
    top: 27%;
    left: 14%;
    width: 72%;
    display: flex;
    flex-direction: column;
    gap: 2.4%;
    font-size: 1.9%;
    font-weight: 700;
    line-height: 1.35;
    white-space: pre-wrap;
  }

  .section-title {
    font-size: 2.2%;
    font-style: italic;
    font-weight: 700;
    color: #333;
    letter-spacing: 0.02em;
  }

  .section-list {
    margin-top: 1.4%;
    display: flex;
    flex-direction: column;
    gap: 0.9%;
    font-size: 1.7%;
    font-weight: 700;
    line-height: 1.28;
    white-space: pre-wrap;
  }

  .home-taste-block {
    position: absolute;
    top: 25.2%;
    left: 10%;
    width: 80%;
  }

  .daily-special-block {
    position: absolute;
    top: 54.2%;
    left: 10%;
    width: 80%;
  }

  .noodle-special-block {
    position: absolute;
    top: 82.2%;
    left: 10%;
    width: 80%;
  }

  .msg {
    max-width: 760px;
    text-align: center;
    color: #222;
    font-size: 20px;
    line-height: 1.6;
    padding: 24px;
  }

  .msg .sub {
    display: block;
    color: #666;
    font-size: 15px;
    margin-top: 10px;
  }

  @media (max-width: 768px) {
    select {
      width: 160px;
      min-width: 160px;
      font-size: 14px;
      padding: 9px 10px;
    }

    .status {
      font-size: 13px;
    }

    .msg {
      font-size: 18px;
      padding: 20px;
    }

    .nav-arrow {
      width: 44px;
      height: 64px;
      font-size: 30px;
    }
  }

  @media (max-width: 420px) {
    select {
      width: 150px;
      min-width: 150px;
    }

    .status {
      font-size: 12px;
    }

    .nav-arrow {
      width: 40px;
      height: 58px;
      font-size: 28px;
    }
  }
</style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <select id="dateSelect"></select>
      <span class="status" id="statusText">Loading...</span>
    </div>
  </div>

  <div class="viewer" id="viewer">
    <button class="nav-arrow left" id="prevArrow" aria-label="Previous">&#8249;</button>

    <div class="canvas-wrap">
      <div id="pageA" class="menu-page"></div>
      <div id="pageB" class="menu-page"></div>
      <div class="msg" id="msg">Loading menu...</div>
    </div>

    <button class="nav-arrow right" id="nextArrow" aria-label="Next">&#8250;</button>
  </div>

<script>
  const SLOT_ORDER = ["breakfast", "lunch", "dinner", "supper"];

  const dateSelect = document.getElementById("dateSelect");
  const statusText = document.getElementById("statusText");
  const viewer = document.getElementById("viewer");
  const prevArrow = document.getElementById("prevArrow");
  const nextArrow = document.getElementById("nextArrow");
  const msg = document.getElementById("msg");
  const pageA = document.getElementById("pageA");
  const pageB = document.getElementById("pageB");

  let menuData = {};
  let availableDates = [];
  let currentDate = null;
  let currentMenus = [];
  let currentIndex = 0;
  let touchStartX = 0;
  let touchEndX = 0;
  let arrowTimer = null;
  let lastAutoKey = "";
  let activePage = pageA;
  let standbyPage = pageB;

  function getQuery(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  function isKioskMode() {
    const param = getQuery("kiosk");
    if (param === "1") return true;
    if (param === "0") return false;

    const w = window.innerWidth;
    const h = window.innerHeight;
    return h > w && w >= 1200;
  }

  if (isKioskMode()) {
    document.body.classList.add("kiosk");
  }

  function formatFolder(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, "0");
    const d = String(date.getDate()).padStart(2, "0");
    return `${y}${m}${d}`;
  }

  function formatLabel(folder) {
    const y = folder.slice(0, 4);
    const m = folder.slice(4, 6);
    const d = folder.slice(6, 8);
    const dt = new Date(`${y}-${m}-${d}T00:00:00`);
    const weekday = dt.toLocaleDateString("en-GB", { weekday: "short" });
    return `${d}/${m}/${y} ${weekday}`;
  }

  function getNowInfo() {
    const now = new Date();
    const seconds = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();

    const today = new Date(now);
    today.setHours(0, 0, 0, 0);

    const yesterday = new Date(today);
    yesterday.setDate(today.getDate() - 1);

    return {
      seconds,
      todayFolder: formatFolder(today),
      yesterdayFolder: formatFolder(yesterday),
      early: seconds <= 5 * 3600
    };
  }

  function preferredSlot(seconds) {
    if (seconds <= 5 * 3600) return "supper";
    if (seconds <= 10 * 3600) return "breakfast";
    if (seconds <= 16 * 3600) return "lunch";
    if (seconds <= 22 * 3600) return "dinner";
    return "supper";
  }

  function showArrows() {
    prevArrow.classList.add("active");
    nextArrow.classList.add("active");

    clearTimeout(arrowTimer);
    arrowTimer = setTimeout(() => {
      prevArrow.classList.remove("active");
      nextArrow.classList.remove("active");
    }, 1800);
  }

  function nearestIndex(menus, target) {
    if (!menus.length) return 0;

    const exact = menus.findIndex(m => {
      if (target === "supper" && m.isYesterdaySupper) return true;
      return m.slot === target;
    });
    if (exact !== -1) return exact;

    const targetPos = SLOT_ORDER.indexOf(target);
    let best = 0;
    let dist = 99;

    menus.forEach((m, i) => {
      const pos = SLOT_ORDER.indexOf(m.slot);
      if (pos < 0) return;

      const d = Math.min(
        (pos - targetPos + 4) % 4,
        (targetPos - pos + 4) % 4
      );

      if (d < dist) {
        dist = d;
        best = i;
      }
    });

    return best;
  }

  function createListHtml(items) {
    return items.map(x => `<div>${escapeHtml(x)}</div>`).join("");
  }

  function escapeHtml(text) {
    return String(text)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function buildBreakfastPage(menu) {
    return `
      <img class="menu-bg" src="templates/breakfast-bg.png" alt="">
      <div class="content-layer">
        <div class="presented-by">Presented by JR</div>
        <div class="menu-title">${escapeHtml(menu.title)}</div>
        <div class="menu-date">${escapeHtml(menu.date_text)}</div>
        <div class="breakfast-lines">
          ${createListHtml(menu.lines || [])}
        </div>
      </div>
    `;
  }

  function buildMainMealPage(menu) {
    return `
      <img class="menu-bg" src="templates/mainmeal-bg.png" alt="">
      <div class="content-layer">
        <div class="presented-by">Presented by JR</div>
        <div class="menu-title">${escapeHtml(menu.title)}</div>
        <div class="menu-date">${escapeHtml(menu.date_text)}</div>

        <div class="home-taste-block">
          <div class="section-title">${escapeHtml(menu.homeTasteTitle || "")}</div>
          <div class="section-list">${createListHtml(menu.homeTaste || [])}</div>
        </div>

        <div class="daily-special-block">
          <div class="section-title">${escapeHtml(menu.dailySpecialTitle || "")}</div>
          <div class="section-list">${createListHtml(menu.dailySpecial || [])}</div>
        </div>

        <div class="noodle-special-block">
          <div class="section-title">${escapeHtml(menu.noodleSpecialTitle || "")}</div>
          <div class="section-list">${createListHtml(menu.noodleSpecial || [])}</div>
        </div>
      </div>
    `;
  }

  function renderMenuPage(menuItem, container) {
    if (menuItem.slot === "breakfast") {
      container.innerHTML = buildBreakfastPage(menuItem.data);
    } else {
      container.innerHTML = buildMainMealPage(menuItem.data);
    }
  }

  function swapPages(menuItem) {
    renderMenuPage(menuItem, standbyPage);
    standbyPage.classList.add("visible");
    activePage.classList.remove("visible");

    const temp = activePage;
    activePage = standbyPage;
    standbyPage = temp;
  }

  function buildMenusForDate(folder) {
    const dayData = menuData[folder];
    if (!dayData) return [];

    const result = [];

    if (dayData.breakfast) {
      result.push({
        slot: "breakfast",
        label: "Breakfast",
        data: dayData.breakfast,
        isYesterdaySupper: false
      });
    }

    if (dayData.lunch) {
      result.push({
        slot: "lunch",
        label: "Lunch",
        data: dayData.lunch,
        isYesterdaySupper: false
      });
    }

    if (dayData.dinner) {
      result.push({
        slot: "dinner",
        label: "Dinner",
        data: dayData.dinner,
        isYesterdaySupper: false
      });
    }

    if (dayData.supper) {
      result.push({
        slot: "supper",
        label: "Supper",
        data: dayData.supper,
        isYesterdaySupper: false
      });
    }

    return result;
  }

  function buildYesterdaySupper(folder) {
    const dayData = menuData[folder];
    if (!dayData || !dayData.supper) return null;

    return {
      slot: "supper",
      label: "Yesterday Supper",
      data: dayData.supper,
      isYesterdaySupper: true
    };
  }

  function showMenu() {
    if (!currentMenus.length) {
      activePage.classList.remove("visible");
      standbyPage.classList.remove("visible");
      msg.style.display = "block";
      msg.innerHTML = `No menu available<span class="sub">Please select another available date.</span>`;
      statusText.textContent = "No menu available";
      return;
    }

    const item = currentMenus[currentIndex];
    msg.style.display = "none";
    swapPages(item);
    statusText.textContent = `${item.label} · ${currentIndex + 1} / ${currentMenus.length}`;
  }

  function next() {
    if (!currentMenus.length) return;
    currentIndex = (currentIndex + 1) % currentMenus.length;
    showMenu();
    showArrows();
  }

  function prev() {
    if (!currentMenus.length) return;
    currentIndex = (currentIndex - 1 + currentMenus.length) % currentMenus.length;
    showMenu();
    showArrows();
  }

  viewer.addEventListener("mousemove", showArrows);

  viewer.addEventListener("click", (e) => {
    showArrows();

    if (e.target === prevArrow || e.target === nextArrow) return;
    if (!currentMenus.length) return;

    next();
  });

  viewer.addEventListener("touchstart", e => {
    touchStartX = e.changedTouches[0].clientX;
    showArrows();
  }, { passive: true });

  viewer.addEventListener("touchend", e => {
    touchEndX = e.changedTouches[0].clientX;
    const delta = touchEndX - touchStartX;
    if (Math.abs(delta) < 40) return;
    delta < 0 ? next() : prev();
  }, { passive: true });

  document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft") prev();
    if (e.key === "ArrowRight") next();
  });

  prevArrow.onclick = prev;
  nextArrow.onclick = next;

  async function loadJsonData() {
    const res = await fetch(`data/menu-data.json?v=${Date.now()}`);
    if (!res.ok) throw new Error("Failed to load menu-data.json");
    menuData = await res.json();
  }

  function buildAvailableDates() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const result = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      const folder = formatFolder(d);

      if (i === 0 || menuData[folder]) {
        result.push(folder);
      }
    }

    return result;
  }

  async function selectDate(folder) {
    currentDate = folder;

    const todayMenus = buildMenusForDate(folder);
    const now = getNowInfo();

    if (folder === now.todayFolder && now.early) {
      const ys = buildYesterdaySupper(now.yesterdayFolder);
      currentMenus = ys ? [ys, ...todayMenus] : todayMenus;
    } else {
      currentMenus = todayMenus;
    }

    const slot = preferredSlot(now.seconds);
    currentIndex = nearestIndex(currentMenus, slot);

    showMenu();
  }

  async function autoUpdate() {
    if (!currentDate) return;

    const now = getNowInfo();
    if (currentDate !== now.todayFolder) return;

    const key = preferredSlot(now.seconds) + (now.early ? "y" : "");
    if (key === lastAutoKey) return;

    lastAutoKey = key;
    await selectDate(currentDate);
  }

  async function init() {
    try {
      await loadJsonData();

      availableDates = buildAvailableDates();
      dateSelect.innerHTML = "";

      availableDates.forEach(d => {
        const opt = document.createElement("option");
        opt.value = d;
        opt.textContent = formatLabel(d);
        dateSelect.appendChild(opt);
      });

      dateSelect.onchange = () => selectDate(dateSelect.value);

      await selectDate(availableDates[0]);

      const now = getNowInfo();
      lastAutoKey = preferredSlot(now.seconds) + (now.early ? "y" : "");
      setInterval(autoUpdate, 30000);

    } catch (err) {
      msg.style.display = "block";
      msg.innerHTML = `Unable to load menu data<span class="sub">${escapeHtml(err.message)}</span>`;
      statusText.textContent = "Load failed";
      console.error(err);
    }
  }

  init();
</script>
</body>
</html>
