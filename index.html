<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hoyeh Menu</title>

<style>

:root{
--arrow-bg:rgba(0,0,0,0.08);
--arrow-active:rgba(0,0,0,0.28);
}

html,body{
margin:0;
height:100%;
font-family:Arial,Helvetica,sans-serif;
background:white;
overflow:hidden;
}

body{
display:flex;
flex-direction:column;
}

.topbar{
padding:8px 10px;
border-bottom:1px solid #ddd;
background:#fff;
}

.topbar-inner{
display:flex;
align-items:center;
gap:10px;
}

select{
border:1px solid #ddd;
border-radius:8px;
padding:10px;
width:170px;
}

.status{
font-size:14px;
color:#666;
}

.viewer{
flex:1;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
}

.viewer img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.nav-arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
width:60px;
height:80px;
border:none;
border-radius:14px;
font-size:36px;
background:var(--arrow-bg);
color:white;
cursor:pointer;
opacity:0.05;
transition:opacity .25s,background .2s;
}

.nav-arrow.active{
opacity:1;
background:var(--arrow-active);
}

.nav-arrow.left{left:10px}
.nav-arrow.right{right:10px}

body.kiosk .topbar{display:none}

</style>
</head>

<body>

<div class="topbar">
<div class="topbar-inner">
<select id="dateSelect"></select>
<span class="status" id="statusText">Loading...</span>
</div>
</div>

<div class="viewer" id="viewer">

<button class="nav-arrow left" id="prevArrow">&#8249;</button>

<img id="slide"/>

<button class="nav-arrow right" id="nextArrow">&#8250;</button>

</div>

<script>

const menuFiles=[
{file:"breakfast.png",label:"Breakfast",slot:"breakfast"},
{file:"lunch.png",label:"Lunch",slot:"lunch"},
{file:"dinner.png",label:"Dinner",slot:"dinner"},
{file:"supper.png",label:"Supper",slot:"supper"}
];

const slotOrder=["breakfast","lunch","dinner","supper"];

let currentMenus=[];
let currentIndex=0;
let currentDate=null;
let lastAutoKey="";

const slide=document.getElementById("slide");
const status=document.getElementById("statusText");
const dateSelect=document.getElementById("dateSelect");
const viewer=document.getElementById("viewer");

const prevArrow=document.getElementById("prevArrow");
const nextArrow=document.getElementById("nextArrow");

let touchStart=0;
let touchEnd=0;
let arrowTimer=null;

function getQuery(name){
return new URLSearchParams(location.search).get(name);
}

function isKioskMode(){

const param=getQuery("kiosk");

if(param==="1") return true;
if(param==="0") return false;

const w=window.innerWidth;
const h=window.innerHeight;

return h>w && w>=1200;
}

if(isKioskMode()) document.body.classList.add("kiosk");

function formatFolder(date){
const y=date.getFullYear();
const m=(date.getMonth()+1).toString().padStart(2,"0");
const d=date.getDate().toString().padStart(2,"0");
return `${y}${m}${d}`;
}

function formatLabel(folder){

const y=folder.slice(0,4);
const m=folder.slice(4,6);
const d=folder.slice(6,8);

const dt=new Date(`${y}-${m}-${d}`);

const weekday=dt.toLocaleDateString("en-GB",{weekday:"short"});

return `${d}/${m}/${y} ${weekday}`;
}

function checkImage(url){
return new Promise(res=>{
const img=new Image();
img.onload=()=>res(url);
img.onerror=()=>res(null);
img.src=url;
});
}

async function loadMenus(folder){

const results=await Promise.all(
menuFiles.map(async item=>{
const url=`images/${folder}/${item.file}`;
const ok=await checkImage(url);
if(!ok) return null;
return {...item,url:url+"?t="+Date.now(),date:folder};
})
);

return results.filter(Boolean);
}

async function loadYesterdaySupper(folder){

const url=`images/${folder}/supper.png`;
const ok=await checkImage(url);
if(!ok) return null;

return{
slot:"supper",
label:"Yesterday Supper",
url:url+"?t="+Date.now(),
date:folder
};
}

function getNowInfo(){

const now=new Date();

const seconds=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

const today=new Date(now);
today.setHours(0,0,0,0);

const yesterday=new Date(today);
yesterday.setDate(today.getDate()-1);

return{
seconds,
todayFolder:formatFolder(today),
yesterdayFolder:formatFolder(yesterday),
early:seconds<=5*3600
};
}

function preferredSlot(seconds){

if(seconds<=5*3600) return "supper";
if(seconds<=10*3600) return "breakfast";
if(seconds<=16*3600) return "lunch";
if(seconds<=22*3600) return "dinner";
return "supper";

}

function nearestIndex(menus,target){

if(!menus.length) return 0;

const exact=menus.findIndex(m=>m.slot===target);
if(exact!==-1) return exact;

const targetPos=slotOrder.indexOf(target);

let best=0;
let dist=99;

menus.forEach((m,i)=>{

const pos=slotOrder.indexOf(m.slot);

const d=Math.min(
(pos-targetPos+4)%4,
(targetPos-pos+4)%4
);

if(d<dist){
dist=d;
best=i;
}

});

return best;

}

function showMenu(){

if(!currentMenus.length){
slide.style.display="none";
status.textContent="No menu available";
return;
}

slide.style.display="block";
slide.src=currentMenus[currentIndex].url;

status.textContent=`${currentMenus[currentIndex].label} · ${currentIndex+1} / ${currentMenus.length}`;

}

function next(){

if(!currentMenus.length) return;

currentIndex=(currentIndex+1)%currentMenus.length;

showMenu();
showArrows();

}

function prev(){

if(!currentMenus.length) return;

currentIndex=(currentIndex-1+currentMenus.length)%currentMenus.length;

showMenu();
showArrows();

}

function showArrows(){

prevArrow.classList.add("active");
nextArrow.classList.add("active");

clearTimeout(arrowTimer);

arrowTimer=setTimeout(()=>{
prevArrow.classList.remove("active");
nextArrow.classList.remove("active");
},1800);

}

viewer.addEventListener("mousemove",showArrows);
viewer.addEventListener("click",showArrows);

viewer.addEventListener("touchstart",e=>{
touchStart=e.changedTouches[0].clientX;
showArrows();
},{passive:true});

viewer.addEventListener("touchend",e=>{

touchEnd=e.changedTouches[0].clientX;

const delta=touchEnd-touchStart;

if(Math.abs(delta)<40) return;

delta<0?next():prev();

},{passive:true});

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft") prev();
if(e.key==="ArrowRight") next();
});

prevArrow.onclick=prev;
nextArrow.onclick=next;

async function selectDate(folder){

currentDate=folder;

const todayMenus=await loadMenus(folder);

const now=getNowInfo();

if(folder===now.todayFolder && now.early){

const ys=await loadYesterdaySupper(now.yesterdayFolder);

currentMenus=ys?[ys,...todayMenus]:todayMenus;

}else{

currentMenus=todayMenus;

}

const slot=preferredSlot(now.seconds);

currentIndex=nearestIndex(currentMenus,slot);

showMenu();

}

async function init(){

const today=new Date();
today.setHours(0,0,0,0);

const dates=[];

for(let i=0;i<7;i++){

const d=new Date(today);
d.setDate(today.getDate()+i);

const folder=formatFolder(d);

const menus=await loadMenus(folder);

if(i===0 || menus.length) dates.push(folder);

}

dates.forEach(d=>{
const opt=document.createElement("option");
opt.value=d;
opt.textContent=formatLabel(d);
dateSelect.appendChild(opt);
});

dateSelect.onchange=()=>selectDate(dateSelect.value);

await selectDate(dates[0]);

setInterval(autoUpdate,30000);

}

async function autoUpdate(){

if(!currentDate) return;

const now=getNowInfo();

if(currentDate!==now.todayFolder) return;

const key=preferredSlot(now.seconds)+(now.early?"y":"");

if(key===lastAutoKey) return;

lastAutoKey=key;

await selectDate(currentDate);

}

init();

</script>
</body>
</html>
